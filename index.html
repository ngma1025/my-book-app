<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書管理 v3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 800px; margin: auto; }
        .section { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }

        /* スキャナーボタンのスタイル */
        .scanner-ctrl-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: all 0.3s; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-on { background: var(--primary); color: white; }
        .btn-off { background: #64748b; color: white; }

        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; display: none; }
        
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .book-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .card-actions { margin-top: auto; padding-top: 10px; display: flex; gap: 8px; }
        .btn-action { flex: 1; padding: 8px; border-radius: 6px; font-size: 0.8rem; text-decoration: none; text-align: center; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; }

        #preview { display: none; background: #f0f9ff; border: 2px solid #bae6fd; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>蔵書スキャナー</h2>
        
        <button id="scanner-toggle-btn" class="scanner-ctrl-btn btn-on">
            📷 スキャナーを起動する
        </button>

        <div id="reader"></div>
        
        <div id="preview">
            <div id="pre-title" style="font-weight:bold;"></div>
            <div id="pre-author"></div>
            <button id="btn-save" style="background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; width:100%; margin-top:10px; cursor:pointer; font-weight:bold;">CSVに登録する</button>
        </div>
    </div>

    <div class="section">
        <h3>登録済み一覧</h3>
        <div id="book-list" class="book-grid">読み込み中...</div>
    </div>
</div>

<script>
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbziPJgpM21KMpuagIGdR1JrMgn_l6fAlQjhUZb2Ewc-ssPLHQ8C9il4_9tkN0JfS90IsA/exec";
    
    let html5QrCode = null;
    let isScanning = false;

    // --- 1. スキャナー制御ロジック ---
    const toggleBtn = document.getElementById('scanner-toggle-btn');
    const readerDiv = document.getElementById('reader');

    toggleBtn.addEventListener('click', async () => {
        if (!isScanning) {
            await startScanner();
        } else {
            await stopScanner();
        }
    });

    async function startScanner() {
        try {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            readerDiv.style.display = 'block';
            
            await html5QrCode.start(
                { facingMode: "environment" },
                { fps: 15, qrbox: 280 },
                onScanSuccess
            );

            isScanning = true;
            toggleBtn.innerText = "🛑 スキャナーを停止する";
            toggleBtn.classList.remove('btn-on');
            toggleBtn.classList.add('btn-off');
        } catch (err) {
            alert("カメラの起動に失敗しました: " + err);
        }
    }

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            await html5QrCode.stop();
            readerDiv.style.display = 'none';
            isScanning = false;
            toggleBtn.innerText = "📷 スキャナーを起動する";
            toggleBtn.classList.remove('btn-off');
            toggleBtn.classList.add('btn-on');
        }
    }

    async function onScanSuccess(decodedText) {
        const isbn = decodedText.replace(/[-\s]/g, "");
        if (/^(978|979)\d{10}$/.test(isbn)) {
            // スキャン成功したら一度停止する
            await stopScanner();
            fetchBookInfo(isbn);
        }
    }

    // --- 2. 書籍情報取得 & 登録 ---
    async function fetchBookInfo(isbn) {
        try {
            const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
            const data = await res.json();
            if (data && data[0]) {
                const b = data[0].summary;
                const onix = data[0].onix;
                
                // ジャンル取得
                let genre = "一般";
                const subjects = onix?.DescriptiveDetail?.Subject;
                if (subjects) genre = subjects[subjects.length - 1].SubjectHeadingText || "一般";

                document.getElementById("preview").style.display = "block";
                document.getElementById("pre-title").innerText = b.title;
                document.getElementById("pre-author").innerText = `${b.author} (${genre})`;

                document.getElementById("btn-save").onclick = async () => {
                    await fetch(GAS_ENDPOINT, { 
                        method: "POST", 
                        body: JSON.stringify({ ...b, isbn, genre }) 
                    });
                    alert("登録しました");
                    location.reload();
                };
            }
        } catch (e) { alert("情報取得失敗"); location.reload(); }
    }

    // --- 3. 一覧表示 ---
    async function loadList() {
        const list = document.getElementById("book-list");
        try {
            const res = await fetch(GAS_ENDPOINT + "?action=getData");
            const data = await res.json();
            if (!data || data.length <= 1) {
                list.innerHTML = "本はありません。";
                return;
            }
            list.innerHTML = data.slice(1).reverse().map(b => `
                <div class="book-card">
                    <div style="font-size:0.7rem; color:var(--primary); font-weight:bold;">${b[4] || '一般'}</div>
                    <div style="font-weight:bold; margin:5px 0;">${b[0]}</div>
                    <div style="font-size:0.8rem; color:#666;">${b[1]}</div>
                    <div class="card-actions">
                        <a href="https://calil.jp/book/${b[6]}" target="_blank" class="btn-action">図書館</a>
                        <button onclick="deleteBook('${b[6]}', '${b[0]}')" class="btn-action" style="color:var(--danger)">削除</button>
                    </div>
                </div>
            `).join('');
        } catch (e) { list.innerHTML = "取得エラー"; }
    }

    async function deleteBook(isbn, title) {
        if (!confirm(title + " を削除しますか？")) return;
        await fetch(GAS_ENDPOINT, { method: "POST", body: JSON.stringify({ action: "delete", isbn, title }) });
        loadList();
    }

    loadList();
</script>
</body>
</html>
