<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書管理 Pro v6.1 - Expert Logic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; }
        .container { max-width: 850px; margin: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 1.1rem; border-left: 5px solid var(--primary); padding-left: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .ctrl-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: #64748b; color: white; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; display: none; margin-top: 15px; }
        .input-group { display: flex; gap: 8px; margin-top: 15px; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .book-card { background: white; padding: 18px; border-radius: 14px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.2s; position: relative; }
        .book-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        .genre-badge { display: inline-block; background: #dcfce7; color: #166534; padding: 3px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 800; margin-bottom: 10px; align-self: flex-start; border: 1px solid #bbf7d0; }
        .book-title { font-weight: 800; font-size: 1.05rem; color: #0f172a; margin-bottom: 6px; line-height: 1.4; }
        .book-meta { font-size: 0.85rem; color: #64748b; margin-bottom: 4px; }
        
        #preview { display: none; background: #f0f9ff; border: 2px solid #bae6fd; padding: 20px; border-radius: 14px; margin-top: 15px; border-left: 8px solid var(--primary); }
        .edit-input { width: 100%; padding: 10px; border: 2px solid #bae6fd; border-radius: 8px; margin-bottom: 15px; font-size: 1rem; font-weight: bold; background: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>蔵書スキャナー <small style="font-weight:normal; font-size:0.7rem; color:#94a3b8;">v6.1 Expert</small></h2>
        <button id="scan-toggle" class="ctrl-btn btn-start">📷 スキャン開始</button>
        <div id="reader"></div>

        <div class="input-group">
            <input type="text" id="manual-isbn" class="search-box" style="flex:2" placeholder="ISBNを入力（ハイフンOK）">
            <button onclick="manualRegister()" class="btn-start" style="flex:1; border-radius:10px; border:none; cursor:pointer; color:white; font-weight:bold;">登録</button>
        </div>
        
        <div id="preview">
            <div style="font-size:0.8rem; color:#0369a1; font-weight:bold; margin-bottom:5px;">💡 ジャンルを確認（必要なら修正）:</div>
            <input type="text" id="edit-genre" class="edit-input">
            <div id="pre-title" style="font-weight:bold; font-size:1.1rem; margin-bottom:4px;"></div>
            <div id="pre-author" style="color:#64748b; font-size:0.9rem; margin-bottom:20px;"></div>
            <button id="btn-save" class="btn-start" style="padding:15px; width:100%; border:none; border-radius:10px; cursor:pointer; font-size:1.1rem;">CSVに登録</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; width:100%; margin-top:12px; cursor:pointer; font-size:0.85rem;">キャンセル</button>
        </div>
    </div>

    <div class="section">
        <h2>登録済み一覧 <span id="sync-status" style="font-size:0.7rem; font-weight:normal; color:#94a3b8; float:right;">Syncing...</span></h2>
        <input type="text" id="searchInput" class="search-box" placeholder="タイトル、著者、ジャンルで検索..." onkeyup="filterBooks()">
        <div id="book-list" class="book-grid"></div>
    </div>
</div>

<script>
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbziPJgpM21KMpuagIGdR1JrMgn_l6fAlQjhUZb2Ewc-ssPLHQ8C9il4_9tkN0JfS90IsA/exec";
    const STORAGE_KEY = "book_pro_cache_v61";

    // --- 超精密ジャンルマッピング (Cコード下2桁) ---
    const C_CODE_MAP = {
        "00":"総記","01":"百科事典","04":"情報科学","10":"哲学","11":"心理学","15":"宗教","20":"歴史","21":"日本史","22":"地理","23":"西洋史",
        "30":"社会科学","31":"政治","32":"法律","33":"経済・経営","34":"財政","35":"統計","36":"社会","37":"教育","39":"国防・軍事",
        "40":"自然科学","41":"数学","42":"物理学","43":"化学","44":"天文・宇宙","45":"地球科学","47":"生物学","49":"医学・薬学",
        "50":"工学一般","51":"土木・建設","52":"建築","53":"機械工学","54":"電気工学","55":"電子通信","56":"情報工学","58":"製造・生産",
        "60":"産業","61":"農業","63":"水産業","65":"商業","70":"芸術","71":"絵画","74":"写真","76":"音楽","77":"演劇","78":"スポーツ","79":"娯楽",
        "80":"語学","81":"日本語","82":"英語","90":"文学","91":"日本文学","93":"西洋文学","95":"詩歌"
    };

    let html5QrCode = null, isScanning = false, allBooks = [];

    async function init() {
        allBooks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        renderBooks(allBooks);
        try {
            const res = await fetch(GAS_ENDPOINT + "?action=getData");
            const data = await res.json();
            if (data && data.length > 1) {
                allBooks = data.slice(1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allBooks));
                renderBooks(allBooks);
                document.getElementById('sync-status').innerText = "Synced ✅";
            }
        } catch (e) { document.getElementById('sync-status').innerText = "Offline Mode 📡"; }
    }

    function renderBooks(books) {
        const list = document.getElementById("book-list");
        list.innerHTML = [...books].reverse().map(b => `
            <div class="book-card">
                <span class="genre-badge">${b[4] || '未分類'}</span>
                <div class="book-title">${b[0]}</div>
                <div class="book-meta">👤 ${b[1]}</div>
                <div class="book-meta">🏢 ${b[2]}</div>
                <div class="card-actions">
                    <a href="https://calil.jp/book/${b[6]}" target="_blank" class="btn-action">図書館</a>
                    <button onclick="deleteLocal('${b[6]}', '${b[0]}')" class="btn-action" style="color:var(--danger)">削除</button>
                </div>
            </div>
        `).join('');
    }

    function filterBooks() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        renderBooks(allBooks.filter(b => b.join('').toLowerCase().includes(q)));
    }

    // --- 判定エンジンのコアロジック ---
    function resolveGenre(onix, summary) {
        const subjects = onix?.DescriptiveDetail?.Subject || [];
        const title = (summary.title + (summary.description || "")).toLowerCase();
        
        // Tier 1: タイトル・キーワードによる強制判定（ユーザーの関心事に特化）
        if (title.includes("5g") || title.includes("6g") || title.includes("通信") || title.includes("wireless")) return "次世代通信技術";
        if (title.includes("アフリカ") || title.includes("africa")) return "アフリカ地域研究";
        if (title.includes("ロシア") || title.includes("russia") || title.includes("ソ連") || title.includes("サハ")) return "ロシア・旧ソ連情勢";
        if (title.includes("数学") || title.includes("余弦") || title.includes("cosine") || title.includes("幾何")) return "数学教育";
        if (title.includes("保守") || title.includes("共感") || title.includes("地方自治")) return "政治・思想";

        // Tier 2: Cコード判定 (Scheme 78)
        const cCodeSub = subjects.find(s => s.SubjectSchemeIdentifier === "78");
        if (cCodeSub && cCodeSub.SubjectCode) {
            const id = cCodeSub.SubjectCode.substring(3, 5);
            if (C_CODE_MAP[id]) return C_CODE_MAP[id];
        }

        // Tier 3: NDC判定 (Scheme 69)
        const ndcSub = subjects.find(s => s.SubjectSchemeIdentifier === "69");
        if (ndcSub && ndcSub.SubjectCode) {
            const top = ndcSub.SubjectCode.substring(0, 1);
            const ndcMap = {"0":"総記","1":"哲学","2":"歴史","3":"社会科学","4":"自然科学","5":"工学・技術","6":"産業","7":"芸術","8":"語学","9":"文学"};
            if (ndcMap[top]) return ndcMap[top];
        }

        // Tier 4: OpenBDの既存ジャンル/キーワード
        if (summary.genre) return summary.genre;
        const kw = subjects.find(s => s.SubjectSchemeIdentifier === "20");
        if (kw) return kw.SubjectHeadingText.split(" ")[0];

        return "未分類";
    }

    // --- 通信・操作系 ---
    async function fetchInfo(isbn) {
        try {
            const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
            const data = await res.json();
            if (!data || !data[0]) { alert("書籍データが見つかりません"); return; }

            const s = data[0].summary;
            const genre = resolveGenre(data[0].onix, s);

            document.getElementById("preview").style.display = "block";
            document.getElementById("edit-genre").value = genre;
            document.getElementById("pre-title").innerText = s.title;
            document.getElementById("pre-author").innerText = s.author + " / " + s.publisher;
            
            document.getElementById("btn-save").onclick = () => {
                const finalGenre = document.getElementById("edit-genre").value;
                saveProcess({ ...s, isbn, genre: finalGenre });
            };
        } catch (e) { alert("API通信エラー"); }
    }

    async function saveProcess(book) {
        const newRow = [book.title, book.author, book.publisher, "", book.genre, "", book.isbn];
        allBooks = [...allBooks, newRow];
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allBooks));
        renderBooks(allBooks);
        document.getElementById("preview").style.display = "none";
        fetch(GAS_ENDPOINT, { method: "POST", body: JSON.stringify(book) }).catch(() => {});
    }

    const scanBtn = document.getElementById('scan-toggle');
    scanBtn.addEventListener('click', async () => {
        if (!isScanning) {
            document.getElementById('reader').style.display = 'block';
            html5QrCode = html5QrCode || new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 280 }, (txt) => {
                const clean = txt.replace(/\D/g, "");
                if (clean.length === 13) { stopScanner(); fetchInfo(clean); }
            });
            isScanning = true; scanBtn.innerText = "🛑 停止"; scanBtn.classList.replace('btn-start', 'btn-stop');
        } else { stopScanner(); }
    });

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            await html5QrCode.stop();
            document.getElementById('reader').style.display = 'none';
            isScanning = false; scanBtn.innerText = "📷 スキャン開始"; scanBtn.classList.replace('btn-stop', 'btn-start');
        }
    }

    async function manualRegister() {
        const clean = document.getElementById('manual-isbn').value.replace(/\D/g, "");
        if (clean.length === 13) { if (isScanning) await stopScanner(); fetchInfo(clean); document.getElementById('manual-isbn').value = ""; }
        else { alert("13桁のISBNを入力してください"); }
    }

    async function deleteLocal(isbn, title) {
        if (!confirm(title + " を削除しますか？")) return;
        allBooks = allBooks.filter(b => b[6] !== isbn || b[0] !== title);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allBooks));
        renderBooks(allBooks);
        fetch(GAS_ENDPOINT, { method: "POST", body: JSON.stringify({ action: "delete", isbn, title }) }).catch(() => {});
    }

    init();
</script>
</body>
</html>
