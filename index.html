<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書管理 Pro (GitHub Edition)</title>
    <!-- QRコードリーダーのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <!-- 分割したCSSを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="section">
        <h2>蔵書スキャナー <small>GitHub版</small></h2>
        <button id="scan-toggle" class="ctrl-btn btn-start">📷 スキャン開始</button>
        <div id="reader"></div>
        <div class="input-group">
            <input type="text" id="manual-isbn" class="search-box" style="flex:2" placeholder="ISBNを入力">
            <button onclick="manualRegister()" class="btn-start" style="flex:1; border-radius:10px; border:none; color:white;">登録</button>
        </div>
        <div id="preview">
            <select id="edit-genre" class="edit-select">
                <option value="科学">科学</option><option value="工学">工学</option><option value="歴史">歴史</option>
                <option value="社会">社会</option><option value="文学">文学</option><option value="実用">実用</option>
                <option value="その他" selected>その他</option>
            </select>
            <div id="pre-title" style="font-weight:bold; font-size:1.1rem;"></div>
            <div id="pre-author" style="color:#64748b; margin-bottom:20px;"></div>
            <button id="btn-save" class="btn-start" style="width:100%;">確定保存</button>
        </div>
    </div>
    <div class="section">
        <h2>登録済み一覧 <span id="sync-status" style="font-size:0.7rem; float:right;">Wait...</span></h2>
        <div id="book-list" class="book-grid"></div>
    </div>
</div>

<!-- 分割したJavaScriptを読み込む (必ずbodyの最後で読み込む) -->
<script src="script.js"></script>
</body>
</html>
