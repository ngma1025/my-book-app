<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔵書管理 v5.1 - Pro</title>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://script.google.com">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --accent: #0284c7; --danger: #ef4444; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1e293b; line-height: 1.5; }
        .container { max-width: 800px; margin: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        h2::before { content: ''; width: 4px; height: 18px; background: var(--primary); border-radius: 2px; }

        .ctrl-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-start { background: var(--primary); color: white; }
        .btn-stop { background: #64748b; color: white; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; display: none; margin-top: 15px; }

        .search-box { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; margin-bottom: 15px; font-size: 1rem; }
        
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .book-card { background: white; padding: 16px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.2s; }
        .book-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .genre-badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 2px 10px; border-radius: 99px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; align-self: flex-start; }
        .book-title { font-weight: bold; font-size: 1rem; color: #0f172a; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .book-meta { font-size: 0.8rem; color: #64748b; margin-bottom: 3px; }

        .card-actions { margin-top: auto; padding-top: 12px; display: flex; gap: 8px; }
        .btn-action { flex: 1; padding: 8px; border-radius: 6px; font-size: 0.75rem; text-decoration: none; text-align: center; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; cursor: pointer; }
        .btn-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }

        #preview { display: none; background: #f0f9ff; border: 2px solid #bae6fd; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .sync-status { font-size: 0.6rem; color: #94a3b8; text-align: right; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>蔵書スキャナー</h2>
        <button id="scan-toggle" class="ctrl-btn btn-start">📷 スキャン開始</button>
        <div id="reader"></div>
        
        <div id="preview">
            <div id="pre-genre" class="genre-badge"></div>
            <div id="pre-title" style="font-weight:bold; margin-bottom:4px;"></div>
            <div id="pre-author" style="color:#64748b; font-size:0.9rem; margin-bottom:12px;"></div>
            <button id="btn-save" style="background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;">即時登録</button>
        </div>
    </div>

    <div class="section">
        <h2>登録済み一覧 <span id="sync-icon" style="font-size: 0.7rem; font-weight: normal; margin-left: 10px;"></span></h2>
        <input type="text" id="searchInput" class="search-box" placeholder="タイトル、著者、ジャンルで検索..." onkeyup="filterBooks()">
        <div id="book-list" class="book-grid"></div>
        <div class="sync-status">Data: <span id="data-count">0</span> books</div>
    </div>
</div>

<script>
    // ★ GASのURLをここに貼り付けてください
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbziPJgpM21KMpuagIGdR1JrMgn_l6fAlQjhUZb2Ewc-ssPLHQ8C9il4_9tkN0JfS90IsA/exec";
    const STORAGE_KEY = "book_inventory_cache_v51";

    // プロフェッショナル用ジャンルマッピング (Cコード下2桁)
    const C_CODE_MAP = {
        "00": "総記", "04": "情報科学", "07": "情報科学",
        "30": "社会科学", "31": "政治", "32": "法律", "33": "経済・経営", "36": "社会",
        "40": "自然科学", "41": "数学", "42": "物理学", "44": "天文・宇宙", "47": "生物学",
        "50": "工学一般", "51": "土木・建設", "52": "建築", "53": "機械工学", 
        "54": "電気工学", "55": "電子通信工学", "56": "情報工学", "58": "製造・生産",
        "60": "産業", "80": "語学", "82": "英語", "90": "文学", "93": "日本文学"
    };

    let html5QrCode = null;
    let isScanning = false;
    let allBooks = [];

    // --- 1. ローカルファースト・ロジック ---
    function loadLocal() {
        const cached = localStorage.getItem(STORAGE_KEY);
        return cached ? JSON.parse(cached) : [];
    }

    function saveLocal(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        allBooks = data;
        renderBooks(data);
        document.getElementById('data-count').innerText = data.length;
    }

    async function initSystem() {
        allBooks = loadLocal();
        renderBooks(allBooks);
        document.getElementById('sync-icon').innerText = "☁️ Syncing...";

        try {
            const res = await fetch(GAS_ENDPOINT + "?action=getData");
            const cloudData = await res.json();
            if (cloudData && cloudData.length > 1) {
                const fresh = cloudData.slice(1);
                saveLocal(fresh);
                document.getElementById('sync-icon').innerText = "✅ Synced";
            }
        } catch (e) {
            document.getElementById('sync-icon').innerText = "📡 Offline Mode";
        }
    }

    function renderBooks(books) {
        const list = document.getElementById("book-list");
        if (books.length === 0) { list.innerHTML = "<p>登録はありません</p>"; return; }
        list.innerHTML = [...books].reverse().map(b => `
            <div class="book-card">
                <span class="genre-badge">${b[4] || '一般'}</span>
                <div class="book-title">${b[0]}</div>
                <div class="book-meta">👤 ${b[1]}</div>
                <div class="book-meta">🏢 ${b[2]}</div>
                <div class="card-actions">
                    <a href="https://calil.jp/book/${b[6]}" target="_blank" class="btn-action">図書館</a>
                    <button onclick="deleteBook('${b[6]}', '${b[0]}')" class="btn-action btn-delete">削除</button>
                </div>
            </div>
        `).join('');
    }

    function filterBooks() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const filtered = allBooks.filter(b => b.join('').toLowerCase().includes(q));
        renderBooks(filtered);
    }

    // --- 2. スキャナー制御 ---
    const scanBtn = document.getElementById('scan-toggle');
    scanBtn.addEventListener('click', async () => {
        if (!isScanning) {
            document.getElementById('reader').style.display = 'block';
            html5QrCode = html5QrCode || new Html5Qrcode("reader");
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 280 }, onScanSuccess);
            is
